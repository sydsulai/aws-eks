apiVersion: v1
kind: Namespace
metadata:
  name: ums-ns

---

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ums-mysql-rds-secrets
  namespace: ums-ns
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: eks/ums/rds
        objectType: secretsmanager
        jmesPath:
          - path: host
            objectAlias: hostname
          - path: port
            objectAlias: port
          - path: dbname
            objectAlias: dbname
          - path: username
            objectAlias: username
          - path: password
            objectAlias: password
    usePodIdentity: "true"
  secretObjects:  # Not good to use below format, just for checking adding this
    - secretName: ums-mysql-rds-secrets-k8s
      type: Opaque
      data:
        - objectName: hostname
          key: DB_HOSTNAME
        - objectName: port
          key: DB_PORT
        - objectName: dbname
          key: DB_NAME
        - objectName: username
          key: DB_USERNAME
        - objectName: password
          key: DB_PASSWORD

---

apiVersion: apps/v1
kind: Deployment 
metadata:
  name: usermgmt-microservice
  namespace: ums-ns
  labels:
    app: usermgmt-restapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: usermgmt-restapp
  template:  
    metadata:
      labels: 
        app: usermgmt-restapp
    spec:
      serviceAccountName: ums-pod-identity-deployment-sa
      initContainers:
        - name: init-db
          image: busybox:1.31
          command: ['sh', '-c', 'echo -e "Checking for the availability of MySQL Server deployment"; while ! nc -z mysql 3306; do sleep 1; printf "-"; done; echo -e "  >> MySQL DB Server has started";']      
      containers:
        - name: usermgmt-restapp
          image: 829007908826.dkr.ecr.ap-south-1.amazonaws.com/eks/ums:1.0.0  
          ports: 
            - containerPort: 8095           
          env:
            - name: DB_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: ums-mysql-rds-secrets-k8s
                  key: DB_HOSTNAME
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: ums-mysql-rds-secrets-k8s
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: ums-mysql-rds-secrets-k8s
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ums-mysql-rds-secrets-k8s
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ums-mysql-rds-secrets-k8s
                  key: DB_PASSWORD
            # - name: NOTIFICATION_SERVICE_HOST
            #   value: "notification-clusterip-service"
            # - name: NOTIFICATION_SERVICE_PORT
            #   value: "8096"           
          livenessProbe:
            exec:
              command: 
                - /bin/sh
                - -c 
                - nc -z localhost 8095
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /usermgmt/health-status
              port: 8095
            initialDelaySeconds: 60
            periodSeconds: 10
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "ums-mysql-rds-secrets"

---

apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: app-namespace
spec:
  type: ExternalName
  externalName: usermgmtdb.closcimyuuq0.ap-south-1.rds.amazonaws.com

---

apiVersion: v1
kind: Service
metadata:
  name: shared-external-nlb
  annotations:
    # Traffic Routing
    service.beta.kubernetes.io/aws-load-balancer-name: shared-external-nlb
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: instance
    #service.beta.kubernetes.io/aws-load-balancer-subnets: subnet-xxxx, mySubnet ## Subnets are auto-discovered if this annotation is not specified, see Subnet Discovery for further details.
    
    # Health Check Settings
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: http
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: traffic-port
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: /index.html
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-healthy-threshold: "3"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-unhealthy-threshold: "3"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval: "10" # The controller currently ignores the timeout configuration due to the limitations on the AWS NLB. The default timeout for TCP is 10s and HTTP is 6s.

    # Access Control
    service.beta.kubernetes.io/load-balancer-source-ranges: 0.0.0.0/0 
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

    # AWS Resource Tags
    service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: Environment=dev,Team=test

    # TLS
    # service.beta.kubernetes.io/aws-load-balancer-ssl-cert: arn:aws:acm:us-east-1:180789647333:certificate/d86de939-8ffd-410f-adce-0ce1f5be6e0d # specifies the ARN of one or more certificates managed by the AWS Certificate Manager.
    # service.beta.kubernetes.io/aws-load-balancer-ssl-ports: 443, # Specify this annotation if you need both TLS and non-TLS listeners on the same load balancer
    # service.beta.kubernetes.io/aws-load-balancer-ssl-negotiation-policy: ELBSecurityPolicy-TLS13-1-2-2021-06 # specifies the Security Policy for NLB frontend connections, allowing you to control the protocol and ciphers.
    # service.beta.kubernetes.io/aws-load-balancer-backend-protocol: tcp # specifies whether to use TLS or TCP for the backend traffic between the load balancer and the kubernetes pods.
spec:
  type: LoadBalancer
  selector:
    app: app3-nginx
  ports:
    - name: http
      port: 80        # Creates NLB Port 80 Listener
      targetPort: 80  # Creates NLB Port 80 Target Group-1  
    - name: https
      port: 443       # Creates NLB Port 443 Listener
      targetPort: 80  # Creates NLB Port 80 Target Group-2   
    - name: http81
      port: 81        # Creates NLB Port 81 Listener
      targetPort: 80  # Creates NLB Port 80 Target Group-3  
    - name: http82
      port: 82        # Creates NLB Port 82 Listener
      targetPort: 80  # Creates NLB Port 80 Target Group-4    

